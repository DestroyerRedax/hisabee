name: Hisabee Complete Release CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

jobs:
  release-verification:
    name: Full Release Qualification & Build Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Pass 1 - Formatting Code
        run: dart format .

      - name: Pass 1 - Static Analysis & Linter
        run: flutter analyze

      - name: Mandatory Floating-Point & Secret Leak Audit
        run: |
          ! grep -rn "double " lib/domain/ lib/core/money/ || (echo "Error: Floating-point currency found!" && exit 1)
          ! grep -rn "API_KEY" lib/ || (echo "Error: Secret key pattern found!" && exit 1)

      - name: Pass 2 & 3 - Unit, Integration & Performance Qualification Tests
        run: flutter test

      - name: Build Release APK
        run: flutter build apk --release

      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hisabee-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
